<button [classList]="buttonClasses.preset[preset] +' '+ buttonClasses.base">

    @if(icon && (iconDir === 'l' || iconDir === 's')) {
    <i-lucide [img]="icon" [size]="iconSize" strokeWidth="1" class="inline"></i-lucide>
    }
    
    <ng-content />

    @if(icon && (iconDir === 'r' || iconDir === 'e')) {
    <i-lucide [img]="icon" [size]="iconSize" strokeWidth="1" class="inline"></i-lucide>
    }

</button>
