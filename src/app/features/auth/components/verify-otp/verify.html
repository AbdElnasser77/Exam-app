<div class="max-w-lg mx-auto flex flex-col justify-center">


    <h2 class="text-2xl text-blue-700 font-bold pb-4">Verify OTP</h2>
    <p class="text-gray-500 ">Please enter the 6-digits code we have sent to: </p>
    <div>
        <p class="font-semibold text-heading select-none">{{email}}. <a (click)="editButton()"
                class="text-blue-700 text-fg-brand hover:text-blue-900 hover:cursor-pointer transition">Edit</a></p>
    </div>

    <div class="pt-7 mx-auto text-center">
        <p-inputOtp [length]="6" size="large" [styleClass]="'!rounded-0'"  [integerOnly]="true"  (onChange)="sendOTP($event)"></p-inputOtp>
        <p class="pt-5 text-gray-500">You can request another code in:  s</p>
    </div>
 
</div>
