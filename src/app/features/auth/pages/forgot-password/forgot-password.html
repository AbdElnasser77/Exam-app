<div class="h-screen max-w-lg mx-auto flex flex-col justify-center ">
    <h1 class="text-3xl font-bold pb-2">Forgot Password</h1>
    <p class="text-gray-500 pb-6">Don’t worry, we will help you recover your account.</p>
    <form [formGroup]="emailForm">
        <div class="mb-5 pb-5">
            <label for="email" class="block mb-2 font-medium">Email</label>
            <input type="email" formControlName="email" id="email"
                class="bg-neutral-secondary-medium border text-gray-800 border-gray-400 text-sm rounded-base focus:ring-blue-200 focus:outline-0 focus:border-blue-600 block w-full px-3 py-2.5 shadow-xs placeholder:text-gray-400"
                placeholder="user@example.com" required />
            <validation-error [control]="emailForm.get('email')" [InputLabel]="'email'"></validation-error>
        </div>

        <buttonComponent (click)="sendEmail()">
            Continue <i-lucide [img]="moveRight" [size]="24" [strokeWidth]="1" class="inline ms-1"></i-lucide>
        </buttonComponent>
        <div class="my-5 text-center">
            <p class="ms-2 text-sm font-medium text-gray-600 text-heading select-none">Don't have an account? <a
                    routerLink="/register" class="text-blue-700 text-fg-brand hover:text-blue-900 transition">Create
                    yours</a></p>
        </div>
    </form>
</div>
