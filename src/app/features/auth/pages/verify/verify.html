<div class="min-h-screen max-w-lg mx-auto flex flex-col justify-center py-10">

    <div class="border-2 border-gray-300 w-fit p-1 mb-10 ">
        <a routerLink="/register">
            <i-lucide [img]="moveLeft" [size]="25" [strokeWidth]="1.5"></i-lucide>
        </a>
    </div>

    <h1 class="text-3xl font-bold pb-2.5">Verify OTP</h1>
    <p class="text-gray-500 ">Please enter the 6-digits code we have sent to:</p>
    <div>
        <p class="font-semibold text-heading select-none">{{email}}. <a routerLink="/register"
                class="text-blue-700 text-fg-brand hover:text-blue-900 hover:cursor-pointer transition">Edit</a></p>
    </div>

    <div class="pt-7  mx-auto text-center">
        <p-inputOtp [length]="6" size="large" [styleClass]="'!rounded-0'"></p-inputOtp>
        <p class="pt-5 text-gray-500">You can request another code in:  s</p>
    </div>

    <buttonComponent class="mt-5">Verify Code</buttonComponent>

    <div class="my-5 text-center">
        <p class="ms-2 text-sm font-medium text-gray-600 text-heading select-none">Don't have an account? <a
                routerLink="/register" class="text-blue-700 text-fg-brand hover:text-blue-900 transition">Create
                yours</a></p>
    </div>
</div>
