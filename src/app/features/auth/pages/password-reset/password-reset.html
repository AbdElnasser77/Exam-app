<div class="min-h-screen max-w-lg mx-auto flex flex-col justify-center py-10">

    <div class="border-2 border-gray-300 w-fit p-1 mb-10 ">
        <a routerLink="/forgot-password">
            <i-lucide [img]="moveLeft" [size]="25" [strokeWidth]="1.5"></i-lucide>
        </a>
    </div>

    <h1 class="text-3xl font-bold pb-2.5">Password Reset Sent</h1>
    <div class="content">
        <p class="">We have sent a password reset link to:</p>
        <div>
            <p class="font-semibold text-heading select-none text-blue-700 "> {{email}} </p>
        </div>
        <p class="py-4">Please check your inbox and follow the instructions to reset your password.</p>
        <span class="text-sm text-gray-500">If you don’t see the email within a few minutes, check your spam or junk
            folder.</span>
 
    </div>

    <div class="my-10 text-center">
        <p class="ms-2 text-sm font-medium text-gray-600 text-heading select-none">Don't have an account? <a
                routerLink="/register" class="text-blue-700 text-fg-brand hover:text-blue-900 transition">Create
                yours</a></p>
    </div>
</div>
