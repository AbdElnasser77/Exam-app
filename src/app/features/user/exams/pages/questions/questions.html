<p-breadcrumb [model]="items" />
<div class=" flex items-stretch gap-x-3 mb-5">
    <buttonComponent (click)="backButton()" [preset]="'primary_outline'" [width]="''" class=""
        [additional]="'h-full w-10'"> <i-lucide [img]="chevronLeft" class="text-blue-700" [strokeWidth]="1"></i-lucide>
    </buttonComponent>
    <app-header class="grow" [additional]="'!my-0 h-full'" [icon]="Questions"> {{this.examTitle}} Questions</app-header>
</div>


<div >
    <div class="flex">

        <div class="flex justify-between grow">
            <p>{{examTitle}}</p>
            <span class="text-gray-500">Question <span class="text-blue-700">1</span> of 25</span>
        </div>
        
    </div>
    <!-- progress bar -->
</div>
